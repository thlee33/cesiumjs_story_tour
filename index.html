<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>CesiumJS Story Tour Prototype</title>
    <!-- CesiumJS CSS -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Cesium Container -->
    <div id="cesiumContainer"></div>

    <!-- UI Overlay: Glassmorphism Panel -->
    <div class="tour-panel" id="tourPanel">
        <div class="tour-header">
            <h1 id="tourMainTitle">Global Landmarks Tour</h1>
            <p id="tourMainDesc">Loading tour data...</p>
        </div>
        
        <div class="chapter-info">
            <div class="chapter-index" id="chapterIndex">Chapter 1 of X</div>
            <h2 class="chapter-title" id="chapterTitle">Title</h2>
            <h3 class="chapter-subtitle" id="chapterSubtitle">Subtitle</h3>
            <p class="chapter-desc" id="chapterDesc">Description goes here.</p>
        </div>

        <div class="tour-controls">
            <button class="control-btn" id="prevBtn" title="이전 지점"><i class="fas fa-step-backward"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn" title="재생/일시정지"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn" title="다음 지점"><i class="fas fa-step-forward"></i></button>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- CesiumJS Script -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <!-- Custom App Script -->
    <script src="js/app.js"></script>
</body>
</html>
